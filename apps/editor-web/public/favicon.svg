<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Prune scissors favicon">
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#1e5c3b"/>

  <!-- scissors -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- blades -->
    <path d="M28 34 L50 20" stroke-width="5"/>
    <path d="M28 30 L50 44" stroke-width="5"/>

    <!-- handle arms -->
    <path d="M28 32 L16 24" stroke-width="6"/>
    <path d="M28 32 L16 40" stroke-width="6"/>

    <!-- handles -->
    <circle cx="14" cy="22" r="5.5" stroke-width="4"/>
    <circle cx="14" cy="42" r="5.5" stroke-width="4"/>
  </g>

  <!-- pivot -->
  <circle cx="28" cy="32" r="2.6" fill="#ffffff"/>
</svg>
