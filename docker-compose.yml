version: '3.8'
services:
  prune:
    image: fauxrhino/prune:latest
    container_name: prune
    restart: unless-stopped
    ports:
      - "4173:4173"
    environment:
      - HOST=0.0.0.0
      - PORT=4173
      - PRUNE_INBOX_ROOT=/data/media
      - PRUNE_ARCHIVE_ROOT=/data/archive
      - PRUNE_UPLOAD_DIR=/data/uploads
      - PRUNE_TRANSCRIPT_DIR=/data/transcripts
      - PRUNE_PROJECTS_DIR=/data/projects
      - PRUNE_EXPORT_DIR=/data/exports
      - PRUNE_SETTINGS_PATH=/data/config.json
    volumes:
      - prune_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  prune_data:
